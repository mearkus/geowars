  { name:'Delta Gauntlet', phase:3, spawns:[{t:'Grunt',n:20,d:0,s:0.2},{t:'Wanderer',n:12,d:2,s:0.25},{t:'Pinwheel',n:8,d:4,s:0.35},{t:'Snake',n:10,d:6,s:0.28},{t:'Bloomer',n:6,d:8,s:0.5,sz:'large'}] },
  // Phase 4 - SECTOR OMEGA (indices 24-29)
  { name:'Omega Rush',     phase:4, spawns:[{t:'Grunt',n:30,d:0,s:0.12},{t:'Wanderer',n:10,d:1,s:0.22}] },
  { name:'Pinwheel Hell',  phase:4, spawns:[{t:'Pinwheel',n:15,d:0,s:0.28}] },
  { name:'Fractal Bloom',  phase:4, spawns:[{t:'Bloomer',n:10,d:0,s:0.3,sz:'large'}] },
  { name:'Serpent God',    phase:4, spawns:[{t:'Snake',n:20,d:0,s:0.2},{t:'Pinwheel',n:10,d:3,s:0.3}] },
  { name:'Total War',      phase:4, spawns:[{t:'Grunt',n:20,d:0,s:0.18},{t:'Wanderer',n:12,d:2,s:0.22},{t:'Pinwheel',n:10,d:4,s:0.3},{t:'Snake',n:12,d:6,s:0.22},{t:'Bloomer',n:8,d:8.5,s:0.4,sz:'large'}] },
  { name:'OMEGA FINALE',   phase:4, spawns:[{t:'Grunt',n:25,d:0,s:0.15},{t:'Wanderer',n:15,d:1.5,s:0.2},{t:'Pinwheel',n:12,d:3.5,s:0.28},{t:'Snake',n:15,d:6,s:0.2},{t:'Bloomer',n:10,d:9,s:0.35,sz:'large'}] },
];

function getLevelData(idx) {
  if (idx < 30) return LEVELS_DATA[idx];
  const n = idx - 29; // 1, 2, 3, ...
  return {
    name: `ENDLESS ${n}`,
    phase: 4,
    spawns: [
      { t:'Grunt',    n: Math.min(8 + n*3, 50),             d:0,   s:0.15 },
      { t:'Wanderer', n: Math.min(n*2, 18),                  d:1,   s:0.25 },
      { t:'Pinwheel', n: Math.min(Math.floor(n/2), 12),      d:2.5, s:0.3  },
      { t:'Snake',    n: Math.min(Math.floor(n/2), 14),      d:4,   s:0.25 },
      { t:'Bloomer',  n: Math.min(Math.floor(n/3), 10),      d:6,   s:0.45, sz:'large' },
    ]
  };
}

function createEnemy(type, x, y, sz) {
  switch(type) {
    case 'Grunt':    return new Grunt(x, y);
    case 'Wanderer': return new Wanderer(x, y);
    case 'Pinwheel': return new Pinwheel(x, y);
    case 'Snake':    return new Snake(x, y);
    case 'Bloomer':  return new Bloomer(x, y, sz || 'large');
    default: return new Grunt(x, y);
  }
}

class WaveSpawner {
  constructor(levelIdx, W, H) {
    this.data = getLevelData(levelIdx);
    this.queue = [];
    this.elapsed = 0;
    this.done = false;

    const edgePos = () => {
      const side = randInt(0, 3);
      switch (side) {
        case 0: return new Vec2(rand(30, W - 30), 30);
        case 1: return new Vec2(W - 30, rand(30, H - 30));
        case 2: return new Vec2(rand(30, W - 30), H - 30);
        case 3: return new Vec2(30, rand(30, H - 30));
      }
    };

    for (const g of this.data.spawns) {
      for (let i = 0; i < g.n; i++) {
        const delay = g.d + i * g.s;
        const pos = edgePos();
        this.queue.push({ delay, create: () => createEnemy(g.t, pos.x, pos.y, g.sz) });
      }
    }

    this.queue.sort((a, b) => a.delay - b.delay);
  }

  update(dt) {
    this.elapsed += dt;
    const spawned = [];
    while (this.queue.length > 0 && this.queue[0].delay <= this.elapsed) {
      const entry = this.queue.shift();
      spawned.push(entry.create());
    }
    if (this.queue.length === 0) {
      this.done = true;
    }
    return spawned;
  }

  get totalCount() {
    return this.data.spawns.reduce((s, g) => s + g.n, 0);
  }
}

// =============================================================================
// ProfileManager — Supabase-backed user accounts + global leaderboard
// =============================================================================
class ProfileManager {
  constructor() {
    this.profile     = null;  // { id, name, high_score, highest_level, total_kills, total_games, unlocked_phases }
    this.userId      = null;
    this.email       = null;
    this.leaderboard = [];    // [{ name, score, level, created_at }, ...]
  }

  // Load profile from DB after sign-in. Creates the row if it doesn't exist yet.
  async load(session) {
    if (!_sb) return;
    this.userId = session.user.id;
    this.email  = session.user.email;

    // Try to fetch existing profile
    let { data } = await _sb.from('profiles').select('*').eq('id', this.userId).single();

    if (!data) {
      // First login — create profile row
      const res = await _sb.from('profiles').insert({
        id: this.userId,
        name: 'PLAYER',
        high_score: 0,
        highest_level: 0,
        total_kills: 0,
        total_games: 0,
        unlocked_phases: [true, false, false, false, false]
      }).select().single();
      data = res.data;
    }

    this.profile = data;
    await this.loadLeaderboard();
  }

  getActive() { return this.profile; }

  async updateActive(updates) {
    if (!this.profile || !_sb) return;
    Object.assign(this.profile, updates);
    await _sb.from('profiles').update(updates).eq('id', this.userId);
  }

  async submitScore(score, level) {
    if (!_sb || !this.userId) return;
    await _sb.from('scores').insert({
      user_id: this.userId,
      name:    this.profile?.name ?? 'PLAYER',
      score,
      level
    });
    await this.loadLeaderboard();
  }

  async loadLeaderboard() {
    if (!_sb) return;
    const { data } = await _sb.from('scores')
      .select('name, score, level, created_at')
      .order('score', { ascending: false })
      .limit(10);
    this.leaderboard = data ?? [];
  }

  firstUnlockedPhase() {
    const p = this.profile;
    if (!p) return 0;
    const phases = p.unlocked_phases || [true, false, false, false, false];
    let highest = 0;
    for (let ph = 0; ph < phases.length; ph++) {
      if (phases[ph] === true) highest = ph;
    }
    return highest;
  }

  async rename(name) {
    await this.updateActive({ name });
  }

  async signOut() {
    if (_sb) await _sb.auth.signOut();
    this.profile  = null;
    this.userId   = null;
    this.email    = null;
  }
}
// =============================================================================
// Game — main game controller
// =============================================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('c');
    this.ctx = this.canvas.getContext('2d');
    this.nameInput = document.getElementById('nameInput');
    this.emailInput    = document.getElementById('emailInput');
    this.passwordInput = document.getElementById('passwordInput');

    this.audio = new AudioManager();
    this.input = new InputManager(this.canvas);
    this.particles = new ParticleSystem();
    this.grid = new Grid(44);
    this.profiles = new ProfileManager();

    // State machine
    this.state = 'auth'; // auth | verify_email | phase_select | menu | pairing | leaderboard | playing | level_clear | phase_clear | gameover | paused

    // Game state
    this.score = 0;
    this.lives = 3;
    this.multiplier = 1;
    this.multKills = 0;
    this.multTimer = 0;
    this.currentLevelIdx = 0;

    // Timers
    this.levelClearTimer = 0;
    this.phaseClearTimer = 0;
    this.stateTimer = 0;

    // Entities
    this.player = null;
    this.enemies = [];
    this.bullets = [];       // player bullets
    this.enemyBullets = [];
    this.spawner = null;

    // Rendering
    this.screenShake = 0;
    this.frameCount = 0;
    this.lastTime = 0;

    // UI
    this.clickZones = [];   // rebuilt each frame: [{x,y,w,h,action,longPress?,slot?}]
    this.pressStart = 0;
    this.pressSlot = -1;
    this._longPressHandled = false;
    this.renamingSlot = -1;

    // Auth state
    this._authMode  = 'signin'; // 'signin' | 'signup'
    this._authError = '';
    this._verifyPollTimer = 0;
    this._creatingAccount = false;

    // Phone controller
    this.peerManager    = null;
    this.peerConnected  = false;
    this._qrContainer   = null;
    this._connLostTimer = 0;

    // Level clear state
    this.bonusAwarded = 0;
    this.isPhaseEnd = false;
    this.phaseClearPhase = 0;
    this.isNewBest = false;

    this._setupEvents();
    this.resize();
    window.addEventListener('resize', () => this.resize());
    this.paused = false;
    this._checkSession();
    requestAnimationFrame(t => { this.lastTime = t; this.loop(t); });
  }

  _setupEvents() {
    // Single click handler — never re-registered
    this.canvas.addEventListener('click', e => this._onClick(e));

    // Long-press for profile rename (500ms hold)
    this.canvas.addEventListener('pointerdown', e => {
      this.pressStart = performance.now();
      this.pressSlot = -1;
      this._longPressHandled = false;
      const pos = this._canvasPos(e);
      for (const zone of this.clickZones) {
        if (zone.longPress && this._inZone(pos, zone)) {
          this.pressSlot = zone.slot;
          break;
        }
      }
    });

    this.canvas.addEventListener('pointermove', () => {
      this.pressSlot = -1;
    });

    this.canvas.addEventListener('pointerup', e => {
      const held = performance.now() - this.pressStart;
      if (held >= 480 && this.pressSlot >= 0 && this.state === 'menu') {
        this._longPressHandled = true;
        this._startRename();
      }
      this.pressSlot = -1;
    });

    // Name input confirm
    this.nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') this._confirmRename();
    });
    this.nameInput.addEventListener('blur', () => {
      if (this.renamingSlot >= 0) this._confirmRename();
    });

    // Orientation change (fires before resize on some iOS)
    window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 100));

    // Auto-pause when tab is hidden (phone call, notification, etc.)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && this.state === 'playing') this.setState('paused');
    });

    // Prevent pinch-to-zoom on iOS
    this.canvas.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    this.canvas.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

    // Prevent scroll bleed
    window.addEventListener('wheel', e => e.preventDefault(), { passive: false });
  }

  _canvasPos(e) {
    const r = this.canvas.getBoundingClientRect();
    const scaleX = this.canvas.width / r.width;
    const scaleY = this.canvas.height / r.height;
    return {
      x: (e.clientX - r.left) * scaleX,
      y: (e.clientY - r.top) * scaleY
    };
  }

  _inZone(pos, z) {
    return pos.x >= z.x && pos.x <= z.x + z.w && pos.y >= z.y && pos.y <= z.y + z.h;
  }

  _onClick(e) {
    if (this._longPressHandled) {
      this._longPressHandled = false;
      return;
    }
    if (this.renamingSlot >= 0) return;
    this.audio.resume();
    const pos = this._canvasPos(e);
    for (const zone of this.clickZones) {
      if (!zone.longPress && this._inZone(pos, zone)) {
        zone.action();
        return;
      }
    }
  }

  _addZone(x, y, w, h, action, longPress = false, slot = -1) {
    this.clickZones.push({ x, y, w, h, action, longPress, slot });
  }

  _startRename() {
    this.renamingSlot = 0; // single active profile
    this.nameInput.style.display = 'block';
    this.nameInput.value = this.profiles.profile?.name ?? '';
    this.nameInput.focus();
    this.nameInput.select();
  }

  _confirmRename() {
    this.renamingSlot = -1;
    this.nameInput.style.display = 'none';
    const name = this.nameInput.value.trim().toUpperCase().substring(0, 12) || 'PLAYER';
    this.profiles.rename(name); // async fire-and-forget
  }

  _showAuthOverlay() {
    this.emailInput.style.display    = 'block';
    this.passwordInput.style.display = 'block';
  }
  _hideAuthOverlay() {
    this.emailInput.style.display    = 'none';
    this.passwordInput.style.display = 'none';
  }

  resize() {
    this.W = this.canvas.width = window.innerWidth;
    this.H = this.canvas.height = window.innerHeight;
    this.grid.resize(this.W, this.H);
  }

  setState(s) {
    if (this.state === 'pairing' && s !== 'pairing') this._hidePairingQR();
    // Show/hide auth inputs
    if (s === 'auth') {
      this._showAuthOverlay();
    } else {
      this._hideAuthOverlay();
    }
    this.state = s;
    this.stateTimer = 0;
  }

  async _checkSession() {
    if (!_sb) { this.setState('auth'); return; }
    const { data: { session } } = await _sb.auth.getSession();
    if (session?.user?.email_confirmed_at) {
      await this.profiles.load(session);
      this.setState('menu');
    } else if (session) {
      this._pendingEmail = session.user.email;
      this.setState('verify_email');
    } else {
      this.setState('auth');
    }
  }

  // ---------------------------------------------------------------------------
  // Auth action methods
  // ---------------------------------------------------------------------------

  async _doSignIn() {
    if (!_sb) return;
    const email    = this.emailInput.value.trim();
    const password = this.passwordInput.value;
    this._authError = '';
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) { this._authError = error.message.toUpperCase(); return; }
    if (!data.user.email_confirmed_at) {
      this._pendingEmail = email;
      this.setState('verify_email');
      return;
    }
    await this.profiles.load(data.session);
    this.setState('menu');
  }

  async _doSignUp() {
    if (!_sb) return;
    const email    = this.emailInput.value.trim();
    const password = this.passwordInput.value;
    this._authError = '';
    const { data, error } = await _sb.auth.signUp({ email, password });
    if (error) { this._authError = error.message.toUpperCase(); return; }
    this._pendingEmail = email;
    this.setState('verify_email');
  }

  async _doResendVerification() {
    if (!_sb || !this._pendingEmail) return;
    await _sb.auth.resend({ type: 'signup', email: this._pendingEmail });
  }

  async _doSignOut() {
    await this.profiles.signOut();
    this.setState('auth');
  }

  // ---------------------------------------------------------------------------
  // Game flow methods
  // ---------------------------------------------------------------------------

  startGame(levelIdx) {
    // Reset
    this.score = 0;
    this.lives = 3;
    this.multiplier = 1;
    this.multKills = 0;
    this.multTimer = 0;

    // Clear
    this.enemies = [];
    this.bullets = [];
    this.enemyBullets = [];
    this.particles.clear();

    this.player = new Player(this.W / 2, this.H / 2);

    // Update profile
    const prof = this.profiles.getActive();
    if (prof) {
      this.profiles.updateActive({
        total_games: (prof.total_games || 0) + 1,
        updated_at: new Date().toISOString()
      });
    }

    this.startLevel(levelIdx);
  }

  startLevel(idx) {
    this.currentLevelIdx = idx;
    this.enemies = [];
    this.bullets = [];
    this.enemyBullets = [];
    this.spawner = new WaveSpawner(idx, this.W, this.H);
    this.setState('playing');
  }

  killPlayer() {
    if (this.player && this.player.invincible > 0) return;
    this.audio.die();
    this._explode(this.player.pos.x, this.player.pos.y, '#00ffff', 40, 300);
    this.screenShake = 0.9;
    this.lives--;
    if (this.lives <= 0) {
      this._gameOver();
    } else {
      this.player.pos.set(this.W / 2, this.H / 2);
      this.player.vel.set(0, 0);
      this.player.invincible = 2.5;
      this.bullets = [];
    }
  }

  _gameOver() {
    const prof = this.profiles.getActive();
    const oldHighScore = prof ? (prof.high_score || 0) : 0;
    const oldHighestLevel = prof ? (prof.highest_level || 0) : 0;
    this.isNewBest = this.score > oldHighScore;

    if (prof) {
      const newHigh = Math.max(oldHighScore, this.score);
      const newLevel = Math.max(oldHighestLevel, this.currentLevelIdx);
      this.profiles.updateActive({ high_score: newHigh, highest_level: newLevel });
      this.profiles.submitScore(this.score, this.currentLevelIdx); // async fire-and-forget
    }

    this.setState('gameover');
  }

  _levelClear() {
    const bonus = this.lives * 1000;
    this.score += bonus;
    this.bonusAwarded = bonus;
    this.audio.levelUp();

    // Save progress
    const prof = this.profiles.getActive();
    const oldHighScore = prof ? (prof.high_score || 0) : 0;
    const oldHighestLevel = prof ? (prof.highest_level || 0) : 0;
    if (prof) {
      this.profiles.updateActive({
        highest_level: Math.max(oldHighestLevel, this.currentLevelIdx + 1),
        high_score: Math.max(oldHighScore, this.score)
      });
      this.profiles.submitScore(this.score, this.currentLevelIdx); // async fire-and-forget
    }

    // Check if this is the last level of a phase
    const safeLevelIdx = Math.min(this.currentLevelIdx, 29);
    const curPhase = LEVELS_DATA[safeLevelIdx].phase;
    const phaseEnd = PHASES_DATA[curPhase].end;

    if (this.currentLevelIdx === phaseEnd && curPhase < 4) {
      // Unlock next phase in profile
      const activeProfData = this.profiles.getActive();
      if (activeProfData) {
        const newUnlocked = [...(activeProfData.unlocked_phases || [true, false, false, false, false])];
        newUnlocked[curPhase + 1] = true;
        this.profiles.updateActive({ unlocked_phases: newUnlocked });
      }
      this.isPhaseEnd = true;
      this.phaseClearPhase = curPhase;
      this.levelClearTimer = 3.0;
      this.setState('level_clear');
      return;
    }

    this.isPhaseEnd = false;
    this.levelClearTimer = 3.0;
    this.setState('level_clear');
  }

  _explode(x, y, color, n, spd) {
    this.particles.emit(x, y, color, n, spd, 2, 5, 0.3, 0.8);
    // Shockwave: 6 directions, 3 particles each
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const bv = Vec2.fromAngle(a, spd * 0.6);
      this.particles.emit(
        x + bv.x * 0.1, y + bv.y * 0.1,
        color, 3, spd * 0.55,
        1, 3, 0.2, 0.5
      );
    }
  }

  addMultiplier() {
    this.multKills++;
    this.multTimer = 3.0;
    if (this.multKills >= 10) {
      this.multiplier = Math.min(20, this.multiplier + 1);
      this.multKills = 0;
    }
  }

  // ---------------------------------------------------------------------------
  // update(dt)
  // ---------------------------------------------------------------------------

  update(dt) {
    this.frameCount++;

    if (this.state === 'paused') {
      return; // freeze everything
    } else if (this.state === 'playing') {
      this.input.update(this.player ? this.player.pos : null);
      this._updateGame(dt);
    } else if (this.state === 'level_clear') {
      this.levelClearTimer -= dt;
      if (this.levelClearTimer <= 0) {
        if (this.isPhaseEnd) {
          this.phaseClearTimer = 5.0;
          this.setState('phase_clear');
        } else {
          this.startLevel(this.currentLevelIdx + 1);
        }
      }
    } else if (this.state === 'phase_clear') {
      this.phaseClearTimer -= dt;
      if (this.phaseClearTimer <= 0) {
        const nextPhase = this.phaseClearPhase + 1;
        if (nextPhase >= 5) {
          this.startLevel(30); // endless mode
        } else {
          this.startLevel(PHASES_DATA[nextPhase].start);
        }
      }
    } else if (this.state === 'pairing') {
      // Waiting for phone — PeerManager callbacks drive the transition
    } else if (this.state === 'auth') {
      // inputs handled by DOM; no game logic
    } else if (this.state === 'verify_email') {
      this._verifyPollTimer -= dt;
      if (this._verifyPollTimer <= 0) {
        this._verifyPollTimer = 4;
        if (_sb) {
          _sb.auth.getSession().then(({ data: { session } }) => {
            if (session?.user?.email_confirmed_at) {
              this.profiles.load(session).then(() => this.setState('menu'));
            }
          });
        }
      }
    } else if (this.state === 'leaderboard') {
      // no-op
    }

    if (this._connLostTimer > 0) this._connLostTimer -= dt;

    this.particles.update(dt);
    this.screenShake *= Math.pow(0.04, dt);
    this.stateTimer += dt;
  }

  _updateGame(dt) {
    // Multiplier decay
    if (this.multTimer > 0) {
      this.multTimer -= dt;
      if (this.multTimer <= 0 && this.multiplier > 1) {
        this.multiplier = 1;
        this.multKills = 0;
      }
    }

    // Player
    if (this.player) {
      this.player.update(dt, this.input, this.W, this.H);
    }

    // Fire
    if (this.player && this.input.shooting && this.input.right.len() > 0.1 && this.player.canFire()) {
      this.bullets.push(this.player.fire(this.input.right));
      this.audio.shoot();
    }

    // Player bullets update
    for (let i = this.bullets.length - 1; i >= 0; i--) {
      this.bullets[i].update(dt, this.W, this.H);
      if (this.bullets[i].dead) {
        this.bullets.splice(i, 1);
      }
    }

    // Enemy bullets update + player collision
    for (let i = this.enemyBullets.length - 1; i >= 0; i--) {
      const eb = this.enemyBullets[i];
      eb.update(dt, this.W, this.H);
      if (eb.dead) {
        this.enemyBullets.splice(i, 1);
      } else if (this.player && eb.pos.distTo(this.player.pos) < this.player.size + 3) {
        this.enemyBullets.splice(i, 1);
        this.killPlayer();
      }
    }

    // Spawner
    if (this.spawner) {
      const newEnemies = this.spawner.update(dt);
      for (const e of newEnemies) {
        this.enemies.push(e);
      }
    }

    // Enemies
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const e = this.enemies[i];
      e.update(dt, this.player ? this.player.pos : new Vec2(this.W / 2, this.H / 2), this.W, this.H);

      // Flush pinwheel bullets
      if (e.pendingBullets && e.pendingBullets.length > 0) {
        for (const b of e.pendingBullets) {
          this.enemyBullets.push(b);
        }
        e.pendingBullets = [];
      }

      // Collision with player
      if (this.player && e.collides(this.player.pos, this.player.size)) {
        this.killPlayer();
      }

      // Collision with player bullets
      let enemyKilled = false;
      for (let j = this.bullets.length - 1; j >= 0; j--) {
        const b = this.bullets[j];
        if (b.pos.distTo(e.pos) < e.size + 4) {
          b.dead = true;
          const killed = e.hit();
          if (killed) {
            this.score += e.score * this.multiplier;
            this.addMultiplier();

            // Update profile kills
            const prof = this.profiles.getActive();
            if (prof) {
              prof.total_kills = (prof.total_kills || 0) + 1;
              // Batch-save every 10 kills to reduce DB writes
              if (prof.total_kills % 10 === 0) {
                this.profiles.updateActive({ total_kills: prof.total_kills });
              }
            }

            this.audio.explode(e.size / 14);
            this._explode(e.pos.x, e.pos.y, e.color, 18, 210);
            this.screenShake = Math.min(this.screenShake + 0.12, 0.45);

            // Spawn children (e.g. Bloomer splits)
            if (e.pendingSpawns && e.pendingSpawns.length > 0) {
              for (const spawn of e.pendingSpawns) {
                this.enemies.push(spawn);
              }
            }

            this.enemies.splice(i, 1);
            enemyKilled = true;
          } else {
            this._explode(e.pos.x, e.pos.y, '#ffffff', 5, 80);
          }
          break;
        }
      }

      if (enemyKilled) continue;
    }

    // Level complete check
    if (this.spawner && this.spawner.done && this.enemies.length === 0) {
      this._levelClear();
    }

    // Grid
    const gridEnts = [
      ...(this.player ? [this.player] : []),
      ...this.bullets.slice(0, 15),
      ...this.enemies.slice(0, 15)
    ];
    this.grid.update(dt, gridEnts);
  }

  // ---------------------------------------------------------------------------
  // draw()
  // ---------------------------------------------------------------------------

  draw() {
    const { ctx, W, H } = this;
    this.clickZones = [];

    ctx.save();

    // Screen shake
    if (this.screenShake > 0.01) {
      const mag = this.screenShake * 12;
      ctx.translate(
        (Math.random() * 2 - 1) * mag,
        (Math.random() * 2 - 1) * mag
      );
    }

    // Background
    ctx.fillStyle = '#000008';
    ctx.fillRect(0, 0, W, H);
    this.grid.draw(ctx);

    switch (this.state) {
      case 'auth':          this._drawAuth(ctx);         break;
      case 'verify_email':  this._drawVerifyEmail(ctx);   break;
      case 'leaderboard':   this._drawLeaderboard(ctx);   break;
      case 'phase_select':   this._drawPhaseSelect(ctx);   break;
      case 'menu':           this._drawMenu(ctx);           break;
      case 'pairing':        this._drawPairing(ctx);        break;
      case 'playing':        this._drawPlaying(ctx);        break;
      case 'level_clear':
        this._drawPlaying(ctx);
        this._drawLevelClear(ctx);
        break;
      case 'phase_clear':    this._drawPhaseClear(ctx);    break;
      case 'gameover':       this._drawGameOver(ctx);       break;
      case 'paused':
        this._drawPlaying(ctx);
        this._drawPaused(ctx);
        break;
    }

    ctx.restore();
  }

  // ---------------------------------------------------------------------------
  // Drawing helpers
  // ---------------------------------------------------------------------------

  _neonText(ctx, text, x, y, color, size, align = 'center') {
    ctx.save();
    ctx.font = `bold ${size}px "Courier New", monospace`;
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = size * 0.6;
    ctx.textAlign = align;
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
    ctx.restore();
  }

  _neonRect(ctx, x, y, w, h, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color + '22';
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillRect(x, y, w, h);
    ctx.restore();
  }

  _button(ctx, text, x, y, w, h, color, action) {
    this._neonRect(ctx, x, y, w, h, color);
    this._neonText(ctx, text, x + w / 2, y + h / 2, color, Math.min(h * 0.42, 20));
    this._addZone(x, y, w, h, action);
  }

  // ---------------------------------------------------------------------------
  // Screen drawing methods
  // ---------------------------------------------------------------------------

  _drawAuth(ctx) {
    const { W, H } = this;
    const isSignUp = this._authMode === 'signup';

    this._neonText(ctx, 'GEO WARS', W / 2, H * 0.12, '#00ffff', Math.min(34, H * 0.055));
    this._neonText(ctx, isSignUp ? 'CREATE ACCOUNT' : 'SIGN IN', W / 2, H * 0.22, '#8888ff', Math.min(18, H * 0.04));

    // Position the DOM inputs over the canvas
    const inputW = Math.min(280, W * 0.75);
    const inputH = 44;
    const inputX = W / 2 - inputW / 2;
    const emailY = H * 0.35;
    const passY  = emailY + inputH + 12;

    // Style inputs to sit at the right canvas position
    const r = this.canvas.getBoundingClientRect();
    const sx = r.width  / W;
    const sy = r.height / H;
    const setInputStyle = (el, cx, cy, cw, ch) => {
      el.style.position  = 'fixed';
      el.style.left      = (r.left + cx * sx) + 'px';
      el.style.top       = (r.top  + cy * sy) + 'px';
      el.style.width     = (cw * sx) + 'px';
      el.style.height    = (ch * sy) + 'px';
      el.style.fontSize  = Math.round(16 * sy) + 'px';
    };
    setInputStyle(this.emailInput,    inputX, emailY - inputH / 2, inputW, inputH);
    setInputStyle(this.passwordInput, inputX, passY  - inputH / 2, inputW, inputH);

    // Error message
    if (this._authError) {
      this._neonText(ctx, this._authError, W / 2, passY + inputH, '#ff4444', Math.min(12, H * 0.028));
    }

    const btnW = Math.min(inputW * 0.48, 130);
    const btnH = Math.max(36, H * 0.08);
    const btnY = passY + inputH + (this._authError ? 38 : 20);

    if (isSignUp) {
      this._button(ctx, 'CREATE', inputX, btnY, btnW, btnH, '#00ffff', () => this._doSignUp());
      this._button(ctx, 'BACK', inputX + inputW - btnW, btnY, btnW, btnH, '#446688', () => {
        this._authMode  = 'signin';
        this._authError = '';
      });
    } else {
      this._button(ctx, 'SIGN IN', inputX, btnY, btnW, btnH, '#00ffff', () => this._doSignIn());
      this._button(ctx, 'NEW ACCOUNT', inputX + inputW - btnW, btnY, btnW, btnH, '#8888ff', () => {
        this._authMode  = 'signup';
        this._authError = '';
      });
    }
  }

  _drawVerifyEmail(ctx) {
    const { W, H } = this;
    this._neonText(ctx, 'CHECK YOUR EMAIL', W / 2, H * 0.28, '#00ffff', Math.min(24, H * 0.065));
    this._neonText(ctx, 'Click the verification link we sent to:', W / 2, H * 0.4, '#888888', Math.min(13, H * 0.034));
    this._neonText(ctx, this._pendingEmail || '', W / 2, H * 0.48, '#8888ff', Math.min(14, H * 0.036));
    this._neonText(ctx, 'Then return here to sign in.', W / 2, H * 0.56, '#556677', Math.min(12, H * 0.03));

    const btnW = Math.min(W * 0.4, 180);
    const btnH = Math.max(34, H * 0.08);

    this._button(ctx, 'RESEND EMAIL', W / 2 - btnW / 2, H * 0.68, btnW, btnH, '#ff8844', () => this._doResendVerification());
    this._button(ctx, 'BACK TO SIGN IN', W / 2 - btnW / 2, H * 0.8, btnW, btnH, '#446688', () => {
      this._doSignOut();
    });
  }

  _drawLeaderboard(ctx) {
    const { W, H } = this;
    this._neonText(ctx, 'ALL-TIME SCORES', W / 2, H * 0.1, '#ffff44', Math.min(26, H * 0.065));

    const entries = this.profiles.leaderboard;
    if (entries.length === 0) {
      this._neonText(ctx, 'No scores yet — play a game!', W / 2, H / 2, '#446688', 15);
    } else {
      const rowH = Math.min(36, (H * 0.7) / entries.length);
      const startY = H * 0.22;
      const colors = ['#ffff44', '#aaaaff', '#ff8844'];

      entries.forEach((e, i) => {
        const y   = startY + i * rowH;
        const col = colors[Math.min(i, colors.length - 1)];
        const rank = `${i + 1}.`;
        this._neonText(ctx, rank,              W * 0.18, y, col, Math.min(rowH * 0.52, 16), 'right');
        this._neonText(ctx, e.name,            W * 0.22, y, col, Math.min(rowH * 0.52, 16), 'left');
        this._neonText(ctx, String(e.score),   W * 0.78, y, col, Math.min(rowH * 0.52, 16), 'right');
        this._neonText(ctx, `LV${e.level + 1}`,W * 0.82, y, '#667799', Math.min(rowH * 0.44, 13), 'left');
      });
    }

    const btnW = Math.min(W * 0.4, 180);
    const btnH = Math.max(34, H * 0.08);
    this._button(ctx, 'BACK', W / 2 - btnW / 2, H * 0.88, btnW, btnH, '#446688', () => this.setState('menu'));
  }

  _drawPhaseSelect(ctx) {
    const { W, H } = this;

    this._neonText(ctx, 'SELECT PHASE', W / 2, H * 0.1, '#00ffff', Math.min(26, H * 0.07));
    const activeProf = this.profiles.getActive();
    const profName = activeProf ? activeProf.name : 'PLAYER';
    this._neonText(ctx, profName, W / 2, H * 0.1 + Math.min(30, H * 0.08), '#8888ff', Math.min(14, H * 0.04));

    const tileW = Math.min(W * 0.85, 360);
    const tileX = W / 2 - tileW / 2;

    // Dynamically fit 5 tiles + back button regardless of orientation
    const backBtnH = Math.max(34, H * 0.09);
    const backBtnMargin = Math.max(6, H * 0.02);
    const headerH = H * 0.22;
    const availH = H - headerH - backBtnH - backBtnMargin * 2;
    const tileH = Math.min(72, Math.max(38, availH / 5 - 6));
    const tileGap = Math.max(4, (availH - 5 * tileH) / 4);
    const startY = headerH;

    for (let ph = 0; ph < 5; ph++) {
      const pd = PHASES_DATA[ph];
      const cy = startY + ph * (tileH + tileGap);
      const unlockedPhases = activeProf ? activeProf.unlocked_phases : [true, false, false, false, false];
      const unlocked = unlockedPhases ? (unlockedPhases[ph] || ph === 0) : (ph === 0);

      const nameOffY = Math.round(tileH * 0.42);
      const subOffY = Math.round(tileH * 0.78);
      const nameSize = Math.min(16, tileH * 0.32);
      const subSize = Math.min(12, tileH * 0.24);

      if (unlocked) {
        this._neonRect(ctx, tileX, cy, tileW, tileH, pd.color);
        this._neonText(ctx, pd.name, tileX + 14, cy + nameOffY, pd.color, nameSize, 'left');
        const startLvl = pd.start + 1;
        const endLvl = pd.end + 1;
        if (tileH > 46) {
          this._neonText(ctx, `LEVELS ${startLvl}–${endLvl}`, tileX + 14, cy + subOffY, pd.color + 'aa', subSize, 'left');
        }
        const phIdx = ph;
        this._addZone(tileX, cy, tileW, tileH, () => {
          this.startGame(PHASES_DATA[phIdx].start);
        });
      } else {
        ctx.save();
        ctx.strokeStyle = '#334455';
        ctx.fillStyle = '#222233';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(tileX, cy, tileW, tileH);
        ctx.fillRect(tileX, cy, tileW, tileH);
        ctx.restore();
        this._neonText(ctx, `${pd.name}  [LOCKED]`, tileX + 14, cy + nameOffY, '#445566', nameSize, 'left');
        if (tileH > 46) {
          const prevPhase = PHASES_DATA[ph - 1];
          this._neonText(ctx, `Clear ${prevPhase ? prevPhase.name : ''} to unlock`, tileX + 14, cy + subOffY, '#334455', subSize, 'left');
        }
      }
    }

    // Back button — placed below last tile
    const lastTileBottom = startY + 5 * tileH + 4 * tileGap;
    const backY = lastTileBottom + backBtnMargin;
    const btnW = Math.min(160, W * 0.4);
    this._button(ctx, 'BACK', W / 2 - btnW / 2, backY, btnW, backBtnH, '#446688', () => {
      this.setState('menu');
    });
  }

  _drawMenu(ctx) {
    const { W, H } = this;
    const pulse = 0.9 + 0.1 * Math.sin(this.stateTimer * 2);

    ctx.save();
    ctx.globalAlpha = pulse;
    this._neonText(ctx, 'GEO WARS', W / 2, H * 0.2, '#00ffff', Math.min(36, H * 0.06));
    ctx.restore();

    this._neonText(ctx, 'MOBILE EDITION', W / 2, H * 0.31, '#6666cc', Math.min(16, H * 0.036));

    const activeProf = this.profiles.getActive();
    if (activeProf) {
      this._neonText(ctx, activeProf.name, W / 2, H * 0.42, '#00ffff', Math.min(15, H * 0.034));
      this._neonText(ctx, `HI: ${activeProf.high_score || 0}  |  KILLS: ${activeProf.total_kills || 0}`, W / 2, H * 0.5, '#667799', 12);
    }

    const btnW = Math.min(W * 0.6, 280);
    // Dynamic button height + positions that can't overlap regardless of orientation
    const btnH = Math.min(52, Math.max(36, H * 0.1));
    const btnGap = Math.max(6, H * 0.018);
    const totalBtnsH = 5 * btnH + 4 * btnGap;
    const btnsStartY = Math.min(H * 0.54, H * 0.96 - totalBtnsH);
    const btnX = W / 2 - btnW / 2;

    // PLAY button: start from beginning of highest unlocked phase
    const highestPhase = activeProf ? this.profiles.firstUnlockedPhase() : 0;
    this._button(ctx, 'PLAY', btnX, btnsStartY, btnW, btnH, '#00ffff', () => {
      this.startGame(PHASES_DATA[highestPhase].start);
    });

    this._button(ctx, 'LEVEL SELECT', btnX, btnsStartY + (btnH + btnGap), btnW, btnH, '#44ff88', () => {
      this.setState('phase_select');
    });

    this._button(ctx, 'SCORES', btnX, btnsStartY + 2 * (btnH + btnGap), btnW, btnH, '#ffff44', () => {
      this.profiles.loadLeaderboard().then(() => this.setState('leaderboard'));
    });

    // Phone controller button (orange — indicates secondary/device feature)
    const phoneLabel = this.peerConnected ? 'PHONE CTRL ●' : 'PHONE CTRL';
    const phoneColor = this.peerConnected ? '#00ff88' : '#ff8844';
    this._button(ctx, phoneLabel, btnX, btnsStartY + 3 * (btnH + btnGap), btnW, btnH, phoneColor, () => {
      this._startPairing();
    });

    // RENAME button (5th)
    this._button(ctx, 'RENAME', btnX, btnsStartY + 4 * (btnH + btnGap), btnW, btnH, '#556677', () => {
      this._startRename();
    });

    // Sign out hint + clickable zone
    this._neonText(ctx, `${activeProf ? activeProf.name : ''}  ·  SIGN OUT`, W / 2, H - 14, '#334455', 10);
    this._addZone(W / 2 + 20, H - 26, 100, 20, () => this._doSignOut());
  }

  // ---------------------------------------------------------------------------
  // Phone controller methods
  // ---------------------------------------------------------------------------

  _startPairing() {
    if (!this.peerManager) {
      this.peerManager = new PeerManager(
        (msg) => {
          // null = peer opened (QR ready); object = live input data
          if (msg !== null) this.input.setRemoteInput(msg);
        },
        () => {
          // Phone connected
          this.peerConnected = true;
          if (this.state === 'pairing') this.setState('menu');
        },
        () => {
          // Phone disconnected
          this.peerConnected = false;
          this.input.setRemoteInput(null);
          this._connLostTimer = 3;
        }
      );
    }
    this.setState('pairing');
  }

  _hidePairingQR() {
    if (this._qrContainer) this._qrContainer.style.display = 'none';
  }

  _ensureQRCode() {
    const url = this.peerManager ? this.peerManager.controllerURL() : null;
    if (!url) return;

    if (!this._qrContainer) {
      this._qrContainer = document.createElement('div');
      this._qrContainer.style.cssText = [
        'position:fixed', 'z-index:20',
        'top:50%', 'left:50%',
        'transform:translate(-50%,-10%)',
        'background:#000008',
        'border:1px solid #00ffff44',
        'padding:10px',
        'display:flex', 'align-items:center', 'justify-content:center'
      ].join(';');
      document.body.appendChild(this._qrContainer);
    }

    if (this._qrContainer.dataset.url !== url) {
      this._qrContainer.innerHTML = '';
      this._qrContainer.dataset.url = url;
      const qrSize = Math.min(180, this.W * 0.38, this.H * 0.32);
      new QRCode(this._qrContainer, {
        text: url,
        width:  qrSize,
        height: qrSize,
        colorDark:  '#00ffff',
        colorLight: '#000008',
        correctLevel: QRCode.CorrectLevel.M
      });
    }
    this._qrContainer.style.display = 'flex';
  }

  _drawPairing(ctx) {
    const { W, H } = this;
    this._neonText(ctx, 'PHONE CONTROLLER', W / 2, H * 0.1, '#ff8844', Math.min(24, H * 0.065));

    if (!this.peerManager || !this.peerManager.peerId) {
      const dots = '.'.repeat(1 + Math.floor(this.stateTimer * 2) % 3);
      this._neonText(ctx, `CONNECTING${dots}`, W / 2, H / 2, '#8888ff', 18);
    } else if (this.peerManager.peerId === '__error__') {
      this._neonText(ctx, 'SIGNALING UNAVAILABLE', W / 2, H * 0.42, '#ff4444', 16);
      this._neonText(ctx, 'Check your connection and try again', W / 2, H * 0.52, '#667799', 12);
    } else {
      this._neonText(ctx, 'SCAN WITH YOUR PHONE', W / 2, H * 0.22, '#ffffff', Math.min(15, H * 0.04));
      this._ensureQRCode();
      // Short URL below QR (the QR DOM element sits over this area)
      const url = this.peerManager.controllerURL();
      if (url) {
        const display = url.replace('https://', '').replace('http://', '');
        this._neonText(ctx, display.length > 40 ? display.substring(0, 40) + '…' : display, W / 2, H * 0.8, '#334455', 9);
      }
    }

    const btnW = Math.min(W * 0.4, 180);
    const btnH = Math.max(34, H * 0.08);
    this._button(ctx, 'BACK', W / 2 - btnW / 2, H * 0.88, btnW, btnH, '#446688', () => {
      this.setState('menu');
    });
  }

  _drawPlaying(ctx) {
    const { W, H } = this;

    this.particles.draw(ctx);

    // Enemy bullets
    for (const b of this.enemyBullets) {
      ctx.save();
      ctx.fillStyle = '#ff44ff';
      ctx.shadowColor = '#ff44ff';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(b.pos.x, b.pos.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Player bullets
    for (const b of this.bullets) {
      b.draw(ctx);
    }

    // Enemies
    for (const e of this.enemies) {
      e.draw(ctx);
    }

    // Player
    if (this.player) {
      this.player.draw(ctx, this.frameCount % 5 < 2);
    }

    this._drawHUD(ctx);
    this._drawJoysticks(ctx);

    // Wave intro text (fade in/out during first 1.8s of spawner)
    if (this.spawner && this.spawner.elapsed < 1.8) {
      const ld = getLevelData(this.currentLevelIdx);
      const alpha = Math.sin((this.spawner.elapsed / 1.8) * Math.PI);
      ctx.save();
      ctx.globalAlpha = alpha;
      this._neonText(ctx, `LEVEL ${this.currentLevelIdx + 1}`, W / 2, H / 2 - 30, '#ffffff', 30);
      this._neonText(ctx, ld.name, W / 2, H / 2 + 14, '#aaaaff', 18);
      ctx.restore();
    }
  }

  _drawHUD(ctx) {
    const { W, H } = this;

    // Score (top-left)
    this._neonText(ctx, String(this.score), 20, 28, '#ffffff', 24, 'left');

    // Hi score below
    const activeProf = this.profiles.getActive();
    if (activeProf) {
      this._neonText(ctx, `HI ${activeProf.highScore || 0}`, 20, 52, '#8888ff', 13, 'left');
    }

    // Multiplier (top-center)
    if (this.multiplier > 1 || this.multKills > 0) {
      this._neonText(ctx, `×${this.multiplier}`, W / 2, 26, '#ffff00', 22);

      // Progress bar
      const bw = 90;
      const bh = 4;
      const bx = W / 2 - 45;
      const by = 40;
      const fill = this.multKills / 10;

      ctx.save();
      ctx.fillStyle = '#333300';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#ffff00';
      ctx.shadowColor = '#ff8800';
      ctx.shadowBlur = 8;
      ctx.fillRect(bx, by, bw * fill, bh);
      ctx.restore();
    }

    // Lives (top-right): mini ship icons
    for (let i = 0; i < this.lives; i++) {
      const sx = W - 20 - i * 28;
      const sy = 28;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(-Math.PI / 2);
      ctx.shadowColor = '#00ffff';
      ctx.shadowBlur = 10;
      ctx.strokeStyle = '#00ffff';
      ctx.fillStyle = 'rgba(0,220,255,0.15)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(9, 0);
      ctx.lineTo(-6, -6);
      ctx.lineTo(-3, 0);
      ctx.lineTo(-6, 6);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    // Level + phase name (top-right, below lives)
    const ld = getLevelData(this.currentLevelIdx);
    const phData = PHASES_DATA[Math.min(ld.phase, 4)];
    this._neonText(ctx, `LVL ${this.currentLevelIdx + 1} · ${phData.name}`, W - 16, 56, phData.color, 12, 'right');

    // Phone controller status dot (top-right corner)
    if (this.peerManager) {
      ctx.save();
      const dotR = 5;
      const dotX = W - 10;
      const dotY = 72;
      if (this.peerConnected) {
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 8;
      } else {
        const blink = Math.floor(this.stateTimer * 2) % 2 === 0;
        ctx.fillStyle = blink ? '#ff8800' : '#553300';
        ctx.shadowColor = '#ff8800';
        ctx.shadowBlur = blink ? 6 : 0;
      }
      ctx.beginPath();
      ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // "CTRL LOST" flash when phone drops mid-game
    if (this._connLostTimer > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, this._connLostTimer);
      this._neonText(ctx, 'CTRL LOST', W / 2, 22, '#ff4444', 14);
      ctx.restore();
    }
  }

  _drawJoysticks(ctx) {
    const { W, H } = this;
    const MAX = Math.min(Math.max(65, Math.min(W, H) * 0.13), 90);
    const thumbR = Math.round(MAX * 0.38);

    const drawStick = (stick) => {
      if (!stick) return;
      const { origin, pos } = stick;

      ctx.save();

      // Outer ring
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(origin.x, origin.y, MAX, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Thumb
      const dx = clamp(pos.x - origin.x, -MAX, MAX);
      const dy = clamp(pos.y - origin.y, -MAX, MAX);
      const len = Math.sqrt(dx * dx + dy * dy);
      let tx, ty;
      if (len > MAX) {
        tx = origin.x + (dx / len) * MAX;
        ty = origin.y + (dy / len) * MAX;
      } else {
        tx = pos.x;
        ty = pos.y;
      }

      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tx, ty, thumbR, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    };

    drawStick(this.input.getLeftStick());
    drawStick(this.input.getRightStick());

    // Pause button (top-center, only during active play)
    const pw = 44, ph = 36;
    const px = W / 2 - pw / 2, py = 8;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.strokeRect(px, py, pw, ph);
    ctx.fillRect(px, py, pw, ph);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(px + 13, py + 9, 5, 18);
    ctx.fillRect(px + 26, py + 9, 5, 18);
    ctx.restore();
    this._addZone(px, py, pw, ph, () => this.setState('paused'));
  }

  _drawPaused(ctx) {
    const { W, H } = this;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    this._neonText(ctx, 'PAUSED', W / 2, H / 2 - 50, '#00ffff', 40);
    this._button(ctx, 'RESUME', W / 2 - 100, H / 2, 200, 52, '#00ff88', () => this.setState('playing'));
    this._button(ctx, 'QUIT TO MENU', W / 2 - 100, H / 2 + 68, 200, 48, '#ff4444', () => {
      this._gameOver();
      this.setState('menu');
    });
    ctx.restore();
  }

  _drawLevelClear(ctx) {
    const { W, H } = this;

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);

    this._neonText(ctx, `LEVEL ${this.currentLevelIdx + 1} CLEAR!`, W / 2, H / 2 - 50, '#00ff88', 34);
    this._neonText(ctx, `BONUS +${this.bonusAwarded}`, W / 2, H / 2, '#ffff44', 22);
    this._neonText(ctx, `SCORE: ${this.score}`, W / 2, H / 2 + 44, '#ffffff', 18);
    this._neonText(ctx, `NEXT IN ${Math.ceil(this.levelClearTimer)}…`, W / 2, H / 2 + 80, '#666688', 15);
  }

  _drawPhaseClear(ctx) {
    const { W, H } = this;
    const ph = PHASES_DATA[this.phaseClearPhase];
    const pulse = 0.85 + 0.15 * Math.sin(this.stateTimer * 3);

    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    this._neonText(ctx, 'PHASE COMPLETE!', W / 2, H / 2 - 80, ph.color, 36);
    this._neonText(ctx, ph.name, W / 2, H / 2 - 30, ph.color, 26);
    ctx.globalAlpha = 1;
    this._neonText(ctx, `SCORE: ${this.score}`, W / 2, H / 2 + 30, '#ffffff', 22);

    if (this.phaseClearPhase + 1 < 5) {
      const next = PHASES_DATA[this.phaseClearPhase + 1];
      this._neonText(ctx, `UNLOCKED: ${next.name}`, W / 2, H / 2 + 70, next.color, 17);
    }

    this._neonText(ctx, `CONTINUING IN ${Math.ceil(this.phaseClearTimer)}…`, W / 2, H / 2 + 110, '#555577', 14);
    ctx.restore();
  }

  _drawGameOver(ctx) {
    const { W, H } = this;

    ctx.fillStyle = 'rgba(0,0,8,0.72)';
    ctx.fillRect(0, 0, W, H);

    this._neonText(ctx, 'GAME OVER', W / 2, H * 0.22, '#ff3333', 44);
    this._neonText(ctx, `SCORE: ${this.score}`, W / 2, H * 0.35, '#ffffff', 24);
    this._neonText(ctx, `LEVEL: ${this.currentLevelIdx + 1}`, W / 2, H * 0.43, '#aaaaff', 18);

    if (this.isNewBest) {
      const pulseAlpha = 0.6 + 0.4 * Math.abs(Math.sin(this.stateTimer * 4));
      ctx.save();
      ctx.globalAlpha = pulseAlpha;
      this._neonText(ctx, 'NEW BEST!', W / 2, H * 0.51, '#ffff00', 22);
      ctx.restore();
    }

    const btnW = Math.min(W * 0.55, 260);
    const btnH = 50;
    const btnX = W / 2 - btnW / 2;

    const activeProf = this.profiles.getActive();
    const firstUnlocked = activeProf ? this.profiles.firstUnlockedPhase(this.profiles.active) : 0;

    this._button(ctx, 'PLAY AGAIN', btnX, H * 0.62, btnW, btnH, '#00ffff', () => {
      this.startGame(PHASES_DATA[firstUnlocked].start);
    });

    this._button(ctx, 'MAIN MENU', btnX, H * 0.72, btnW, btnH, '#8888ff', () => {
      this.setState('menu');
    });
  }

  // ---------------------------------------------------------------------------
  // loop(ts)
  // ---------------------------------------------------------------------------

  loop(ts) {
    const dt = Math.min((ts - this.lastTime) / 1000, 0.05);
    this.lastTime = ts;
    this.update(dt);
    this.draw();
    requestAnimationFrame(t => this.loop(t));
  }
}

// =============================================================================
// Controller mode — rendered when ?controller=PEERID is in the URL
// =============================================================================
function _initControllerMode(hostPeerId) {
  // Inject CSS
  const style = document.createElement('style');
  style.textContent = `
    #ctrl-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: row;
      touch-action: none; user-select: none;
      -webkit-user-select: none;
      background: #000008;
    }
    #ctrl-status {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #00ffff; font-family: 'Courier New', monospace;
      font-size: 18px; text-align: center; line-height: 1.6;
      pointer-events: none; z-index: 10; white-space: pre;
    }
    .ctrl-zone {
      flex: 1; position: relative;
      border: 1px solid rgba(0,255,255,0.08);
      display: none;
    }
    .ctrl-zone.left  { border-right: 1px solid rgba(0,255,255,0.15); }
    .ctrl-zone.right { border-left:  1px solid rgba(0,255,255,0.15); }
    .ctrl-label {
      position: absolute; top: 10px; width: 100%;
      text-align: center; color: rgba(0,255,255,0.35);
      font-family: 'Courier New', monospace; font-size: 12px;
      pointer-events: none;
    }
    .ctrl-ring {
      position: absolute; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .ctrl-thumb {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #ctrl-conn-dot {
      position: fixed; top: 14px; right: 14px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff8800;
      box-shadow: 0 0 8px #ff8800;
      animation: blink 1s step-start infinite;
    }
    #ctrl-conn-dot.connected {
      background: #00ff88; box-shadow: 0 0 8px #00ff88;
      animation: none;
    }
    @keyframes blink { 50% { opacity: 0; } }
  `;
  document.head.appendChild(style);

  const overlay = document.createElement('div');
  overlay.id = 'ctrl-overlay';

  const statusEl = document.createElement('div');
  statusEl.id = 'ctrl-status';
  statusEl.textContent = 'CONNECTING…';

  const leftZone  = document.createElement('div');
  leftZone.className = 'ctrl-zone left';
  const rightZone = document.createElement('div');
  rightZone.className = 'ctrl-zone right';

  const leftLabel  = document.createElement('div');
  leftLabel.className = 'ctrl-label';
  leftLabel.textContent = 'MOVE';
  const rightLabel = document.createElement('div');
  rightLabel.className = 'ctrl-label';
  rightLabel.textContent = 'AIM / FIRE';

  leftZone.appendChild(leftLabel);
  rightZone.appendChild(rightLabel);

  const connDot = document.createElement('div');
  connDot.id = 'ctrl-conn-dot';

  overlay.appendChild(leftZone);
  overlay.appendChild(rightZone);
  overlay.appendChild(statusEl);
  overlay.appendChild(connDot);
  document.body.appendChild(overlay);

  // Joystick state
  const RING_R  = 60;  // visual ring radius px
  const THUMB_R = 22;  // thumb radius px
  const MAX_R   = 52;  // normalization radius

  function makeJoystick(zone) {
    const ring  = document.createElement('div');
    ring.className = 'ctrl-ring';
    ring.style.width  = ring.style.height = (RING_R * 2) + 'px';
    const thumb = document.createElement('div');
    thumb.className = 'ctrl-thumb';
    thumb.style.width  = thumb.style.height = (THUMB_R * 2) + 'px';
    zone.appendChild(ring);
    zone.appendChild(thumb);
    return { ring, thumb, id: null, ox: 0, oy: 0, x: 0, y: 0 };
  }

  const ljs = makeJoystick(leftZone);
  const rjs = makeJoystick(rightZone);
  let conn = null;

  function send() {
    if (!conn) return;
    conn.send({
      lx: ljs.x, ly: ljs.y,
      rx: rjs.x, ry: rjs.y,
      s:  (Math.sqrt(rjs.x * rjs.x + rjs.y * rjs.y) > 0.25) ? 1 : 0
    });
  }

  function updateJoystick(js, cx, cy) {
    let dx = cx - js.ox;
    let dy = cy - js.oy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > MAX_R) { dx = dx / dist * MAX_R; dy = dy / dist * MAX_R; }
    js.x = dx / MAX_R;
    js.y = dy / MAX_R;
    // Move thumb visually (clamped)
    const vx = js.ox + dx;
    const vy = js.oy + dy;
    js.thumb.style.left = vx + 'px';
    js.thumb.style.top  = vy + 'px';
  }

  function zonePos(zone, touch) {
    const r = zone.getBoundingClientRect();
    return { x: touch.clientX - r.left, y: touch.clientY - r.top };
  }

  function handleTS(e) {
    for (const t of e.changedTouches) {
      [{ zone: leftZone, js: ljs }, { zone: rightZone, js: rjs }].forEach(({ zone, js }) => {
        const r = zone.getBoundingClientRect();
        if (t.clientX >= r.left && t.clientX <= r.right &&
            t.clientY >= r.top  && t.clientY <= r.bottom && js.id === null) {
          js.id = t.identifier;
          const p = zonePos(zone, t);
          js.ox = p.x; js.oy = p.y;
          // Position ring at touch point
          js.ring.style.left  = p.x + 'px';
          js.ring.style.top   = p.y + 'px';
          js.ring.style.display = 'block';
          js.thumb.style.left = p.x + 'px';
          js.thumb.style.top  = p.y + 'px';
          js.thumb.style.display = 'block';
          js.x = 0; js.y = 0;
        }
      });
    }
    send();
  }

  function handleTM(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === ljs.id) {
        const p = zonePos(leftZone, t);
        updateJoystick(ljs, p.x, p.y);
      } else if (t.identifier === rjs.id) {
        const p = zonePos(rightZone, t);
        updateJoystick(rjs, p.x, p.y);
      }
    }
    send();
  }

  function handleTE(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === ljs.id) {
        ljs.id = null; ljs.x = 0; ljs.y = 0;
        ljs.ring.style.display = ljs.thumb.style.display = 'none';
      } else if (t.identifier === rjs.id) {
        rjs.id = null; rjs.x = 0; rjs.y = 0;
        rjs.ring.style.display = rjs.thumb.style.display = 'none';
      }
    }
    send();
  }

  overlay.addEventListener('touchstart',  handleTS, { passive: true });
  overlay.addEventListener('touchmove',   handleTM, { passive: true });
  overlay.addEventListener('touchend',    handleTE, { passive: true });
  overlay.addEventListener('touchcancel', handleTE, { passive: true });

  // PeerJS connection to host
  const peer = new Peer();
  peer.on('open', () => {
    const c = peer.connect(hostPeerId, { reliable: false, serialization: 'json' });
    c.on('open', () => {
      conn = c;
      statusEl.style.display = 'none';
      leftZone.style.display = rightZone.style.display = 'block';
      connDot.classList.add('connected');
    });
    c.on('close', () => {
      conn = null;
      connDot.classList.remove('connected');
      statusEl.style.display = 'block';
      statusEl.textContent = 'DISCONNECTED\nRefresh to reconnect';
      leftZone.style.display = rightZone.style.display = 'none';
    });
    c.on('error', () => {
      statusEl.textContent = 'CONNECTION FAILED\nRefresh & scan again';
    });
  });
  peer.on('error', () => {
    statusEl.textContent = 'PEER ERROR\nCheck your connection';
  });
}

// =============================================================================
// Initialization
// =============================================================================
window.addEventListener('DOMContentLoaded', () => {
  const hostId = new URLSearchParams(location.search).get('controller');
  if (hostId) {
    document.getElementById('c').style.display = 'none';
    document.getElementById('nameInput').style.display = 'none';
    _initControllerMode(hostId);
  } else {
    window._game = new Game();
  }
});

</script>
